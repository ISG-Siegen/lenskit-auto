[tox]
minversion = 4.26.0
envlist = py312, py313, flake8
isolated_build = true

[gh-actions]
python =
    3.12: py312, flake8
    3.13: py313

[testenv]
setenv =
    PYTHONPATH = {toxinidir}
deps =
    -r{toxinidir}/requirements_dev.txt
commands =
    pytest --basetemp={envtmpdir} --cov=lkauto --cov-report=term-missing

[testenv:flake8]
basepython = python3.12
deps =
    flake8
skip_install = true
commands =
    flake8 lkauto


